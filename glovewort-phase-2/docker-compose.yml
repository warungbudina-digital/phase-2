services:
  deterministic-router:
    build:
      context: ./router
      dockerfile: Dockerfile
    container_name: deterministic-router
    restart: unless-stopped
    environment:
      ROUTER_PORT: ${ROUTER_PORT:-8090}
      ROUTER_EXEC_TIMEOUT: ${ROUTER_EXEC_TIMEOUT:-20}
      ROUTER_MAX_OUTPUT_CHARS: ${ROUTER_MAX_OUTPUT_CHARS:-4000}
      ROUTER_ALLOW_DOCKER_INSPECT: ${ROUTER_ALLOW_DOCKER_INSPECT:-1}
      ROUTER_LOG_LEVEL: ${ROUTER_LOG_LEVEL:-info}
      ROUTER_BRIDGE_API_KEY: ${ROUTER_BRIDGE_API_KEY:-}
      PHASE1_BRIDGE_BASE_URL: ${PHASE1_BRIDGE_BASE_URL}
      PHASE1_BRIDGE_API_KEY: ${PHASE1_BRIDGE_API_KEY}
      PHASE1_FALLBACK_MODEL: ${PHASE1_FALLBACK_MODEL:-qwen2.5-coder:3b-instruct}
      ROUTER_WORKSPACE_ROOT: ${ROUTER_WORKSPACE_ROOT:-/workspace}
      ROUTER_REPO_ROOT: ${ROUTER_REPO_ROOT:-/workspace}
    volumes:
      - ${ROUTER_WORKSPACE_HOST_PATH:-.}:${ROUTER_WORKSPACE_ROOT:-/workspace}:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${ROUTER_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/healthz')\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - phase2_net
      - phase1_shared

networks:
  phase2_net:
    name: ${PHASE2_NETWORK:-glovewort_phase2_net}
  phase1_shared:
    external: true
    name: ${BRAIN_HAND_NETWORK:-brain_hand_net}
